version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - corepack enable
        - corepack prepare pnpm@10.5.2 --activate
        - pnpm install --frozen-lockfile
        - node --experimental-strip-types scripts/sync-tarot-assets.js
    build:
      commands:
        - |
          cat > .env.production <<EOF
          GEMINI_API_KEY=$GEMINI_API_KEY
          CRYPTOPANIC_API_KEY=$CRYPTOPANIC_API_KEY
          NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://jjindong.com}
          NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
          EOF
        - pnpm run build
        - node scripts/resolve-next-symlinks.js
        - node scripts/prepare-amplify-static.js
  artifacts:
    baseDirectory: .
    files:
      - ".next/**/*"
      - "public/**/*"
      - ".amplify-hosting/**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
