version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - corepack enable
        - corepack prepare pnpm@10.5.2 --activate
    build:
      commands:
        # 캐시를 안 쓰므로 의존성을 깨끗하게 처음부터 설치합니다.
        - pnpm install --no-frozen-lockfile
        - node scripts/sync-tarot-assets.js
        - |
          GEMINI_API_KEY=$GEMINI_API_KEY
          NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://jjindong.com}
          NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
          EOF
        - pnpm run build
        - node scripts/resolve-next-symlinks.js
        - node scripts/prepare-amplify-static.js
  artifacts:
    baseDirectory: .
    files:
      - ".next/**/*"
      - "public/**/*"
      - ".amplify-hosting/**/*"

