version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - corepack enable
        - corepack prepare pnpm@10.5.2 --activate
        # 무한 대기를 방지하기 위해 기존에 꼬인 의존성 파일 강제 삭제
        - rm -rf node_modules .next .pnpm-store
    build:
      commands:
        # pnpm install을 본 빌드 단계의 최상단으로 이동
        - pnpm install
        - node scripts/sync-tarot-assets.js
        - |
          cat > .env.production <<EOF
          GEMINI_API_KEY=$GEMINI_API_KEY
          CRYPTOPANIC_API_KEY=$CRYPTOPANIC_API_KEY
          NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://jjindong.com}
          NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
          EOF
        - pnpm run build
        - node scripts/resolve-next-symlinks.js
        - node scripts/prepare-amplify-static.js
  artifacts:
    baseDirectory: .
    files:
      - ".next/**/*"
      - "public/**/*"
      - ".amplify-hosting/**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - .pnpm-store/**/* # 👈 pnpm 캐시 경로를 명시적으로 추가