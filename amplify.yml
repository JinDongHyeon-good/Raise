version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@8.15.5 --activate
        - pnpm install
    build:
      commands:
        - |
          cat > .env.production <<EOF
          GEMINI_API_KEY=$GEMINI_API_KEY
          CRYPTOPANIC_API_KEY=$CRYPTOPANIC_API_KEY
          EOF
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
  # (선택) SSR 자동 인식 보장용
  config:
    SSR: true