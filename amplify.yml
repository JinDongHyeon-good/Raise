version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - corepack enable
        - corepack prepare pnpm@10.5.2 --activate
    build:
      commands:
        # 한 줄씩 안전하게 .env.production 파일 생성
        - echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > .env.production
        - echo "NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://jjindong.com}" >> .env.production
        - echo "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}" >> .env.production
        - echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}" >> .env.production

        # 의존성 설치 및 에셋 동기화
        - pnpm install --no-frozen-lockfile
        - node scripts/sync-tarot-assets.js

        # 빌드 진행
        - pnpm run build
        - node scripts/resolve-next-symlinks.js
        - node scripts/prepare-amplify-static.js
  artifacts:
    baseDirectory: .
    files:
      - ".next/**/*"
      - "public/**/*"
      - ".amplify-hosting/**/*"